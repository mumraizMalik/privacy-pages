<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policies</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
    }
    header {
      background: #2563eb;
      color: white;
      padding: 48px 24px 36px;
      text-align: center;
    }
    header h1 { font-size: 2rem; margin-bottom: 8px; }
    header p { opacity: 0.85; font-size: 1rem; }
    main {
      max-width: 720px;
      margin: 48px auto;
      padding: 0 24px;
    }
    h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 16px; }
    .app-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .app-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .app-list a:hover { border-color: #2563eb; box-shadow: 0 4px 16px rgba(37,99,235,0.1); }
    .app-info h3 { font-size: 1.05rem; color: #1e293b; margin-bottom: 4px; }
    .app-info span { font-size: 0.85rem; color: #64748b; }
    .arrow { color: #2563eb; font-size: 1.2rem; }
    footer {
      text-align: center;
      padding: 40px 24px;
      color: #94a3b8;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Privacy Policies</h1>
    <p>Select an app to view its privacy policy</p>
  </header>

  <main>
    <h2>Our Apps</h2>
    <ul class="app-list">
      <li>
        <a href="./financeapp/">
          <div class="app-info">
            <h3>Finance App</h3>
            <span>Last updated: April 3, 2026</span>
          </div>
          <span class="arrow">→</span>
        </a>
      </li>
      <!-- Add new app entries here:
      <li>
        <a href="./yourapp/">
          <div class="app-info">
            <h3>Your App Name</h3>
            <span>Last updated: ...</span>
          </div>
          <span class="arrow">→</span>
        </a>
      </li>
      -->
    </ul>
  </main>

  <footer>
    &copy; 2026 Mumraiz Malik. All rights reserved.
  </footer>

</body>
</html>
